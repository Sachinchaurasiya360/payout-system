services:
  postgres:
    image: postgres:16-alpine
    container_name: payout_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: payout
      POSTGRES_PASSWORD: payout
      POSTGRES_DB: payout_db
    ports:
      - "5432:5432"
    volumes:
      - payout_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payout -d payout_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  payout_pgdata:
